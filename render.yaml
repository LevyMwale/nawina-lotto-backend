services:
  - type: web
    name: nawina-lotto-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run migrate:verbose && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        value: db.shwcifknkcbnhbbplsbd.supabase.co
      - key: DB_PORT
        value: '5432'
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
